<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="index.css">
   <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>DisignX | Premium Fashion Store for Men & Women</title>
</head>
<body>
    <nav id="navBAR">
 <a href="index.html">
    <h2 class="logo">DisignX</h2></a>
    <button class="menu-btn" onclick="navfunction()">
        <i class="fa-solid fa-bars"></i>
    </button>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Services</a></li>
    </ul>

  <a href="form.html">
    <button class="signUpBTN">Sign up for free</button></a>
</nav>
   <section class="form">
    <form action="#">
        <h2>Create an Account</h2>
        <p class="form-subtitle">Sign up to start shopping with DisignX</p>

        <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">I agree to the Terms & Conditions</label>
        </div>

        <button type="submit" class="submitBTN">Sign Up</button>

        <p class="form-footer">Already have an account? <a href="#">Log in</a></p>
    </form>
</section>
<script type="text/javascript">
    function navfunction() {
        const navLinks = document.querySelector('.nav-links');
        const icon = document.querySelector('.menu-btn i');

        navLinks.classList.toggle('active');

        if (navLinks.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-xmark');
        } else {
            icon.classList.remove('fa-xmark');
            icon.classList.add('fa-bars');
        }
    }
</script>

</body>
</html>
